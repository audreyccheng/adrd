# OpenEvolve Configuration - JOB/IMDB LATENCY-PRIMARY Evolution
# ===============================================================
# LATENCY-BASED FITNESS: Uses actual query execution time as the fitness metric
#
# Key insight (Jan 2026): Cost model dramatically overestimates benefit for JOB
#   - extend baseline: 30.9% cost reduction → 7.9% latency improvement (-23% delta)
#   - Cost-based evolution optimizes for the wrong metric
#
# Solution: With 16GB shared_buffers, all 33 JOB queries complete in ~47s total.
# This makes full latency evaluation feasible (~2.6 hours for 100 iterations).
#
# PREREQUISITES:
#   - PostgreSQL shared_buffers = 16GB (entire DB fits in RAM)
#   - Run warmup before evolution to populate cache
#
# Baseline targets to beat:
#   - extend:    7.9% latency improvement (BEST)
#   - db2advis:  3.7% latency improvement

output_dir: "outputs/job_latency"
max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"
random_seed: 202

diff_based_evolution: true
max_code_length: 40000
early_stopping_patience: 30  # Shorter patience for latency-based
convergence_threshold: 0.005  # 0.5% improvement threshold
early_stopping_metric: "combined_score"  # This will be latency when USE_JOB_LATENCY_FITNESS=true

llm:
  api_base: "https://east-docetl.openai.azure.com/openai/deployments/gpt-5/chat/completions?api-version=2024-12-01-preview"
  models:
    - name: "gpt-5-mini"
      weight: 1.0
      api_base: "https://east-docetl.openai.azure.com/openai/deployments/gpt-5/chat/completions?api-version=2024-12-01-preview"
  temperature: 0.85
  top_p: 0.95
  max_tokens: 16000
  timeout: 300
  retries: 3
  retry_delay: 5

prompt:
  template_dir: null
  
  system_message: |
    You are an expert in database index selection optimization.
    
    ## PROBLEM: SELECT INDEXES FOR JOB/IMDB WORKLOAD
    
    ### ⚠️ CRITICAL: OPTIMIZING FOR ACTUAL LATENCY, NOT COST
    
    This evolution uses **actual query execution time** (latency) as the fitness metric,
    NOT PostgreSQL cost estimates. The cost model dramatically overestimates benefits:
    
    | Program | Cost Reduction | Latency Improvement | Delta |
    |---------|---------------|---------------------|-------|
    | extend  | 37.1%         | **19.2%** 🏆         | -17.9%|
    | db2advis| 18.3%         | 5.0%                | -13.2%|
    
    **Your goal: Beat 19.2% actual latency improvement**
    
    Indexes that look great on paper (high cost reduction) may perform poorly in practice.
    Focus on indexes that demonstrably speed up query execution.
    
    ### 🏆 OBSERVATION: extend achieves better latency with fewer indexes
    
    | Algorithm | Indexes | Latency↓ |
    |-----------|---------|----------|
    | extend    | 14      | **19.2%** |
    | db2advis  | 15      | 5.0%      |
    
    ### JOB/IMDB Characteristics
    
    - 33 queries (FULL workload), 2000MB budget, 21 tables
    - **title** appears in 100% of queries - MANDATORY to index well
    - **name** (80%), **movie_keyword** (80%) are high-value join columns
    - **cast_info** is HUGE (36M rows) but only 51% of queries - size/benefit tradeoff
    - Database: 8.3GB, fully cached in PostgreSQL shared_buffers
    
    ### Query Timing Profile (baseline, warm cache)
    
    Most impactful queries by execution time:
    - Q15 (10.2s), Q9 (5.0s), Q16-17 (4.1s each) = 50% of total time
    - 13 queries < 100ms (1% of time) - don't over-optimize for these
    
    **Focus on indexes that help the slow queries (Q6, Q7, Q9, Q12, Q15-17, Q19, Q24, Q29)**
    
    ## ⚠️ CRITICAL: ALGORITHM COMPLEXITY REQUIREMENTS
    
    Your algorithm MUST complete in < 5 minutes on 33 queries with 150 candidates.
    
    ### 🚫 FORBIDDEN PATTERNS (will timeout - DO NOT USE!)
    
    ```python
    # ❌ NEVER DO THIS - O(n^k) exponential complexity!
    for combo in itertools.combinations(candidates, k):  # FORBIDDEN
        cost = evaluate(combo)
    
    # ❌ NEVER enumerate all subsets
    for subset in powerset(candidates):  # FORBIDDEN
    ```
    
    ### ✅ REQUIRED: O(n²) or better complexity
    
    ```python
    # ✅ GOOD: Greedy selection - O(n × max_indexes)
    selected = set()
    for _ in range(max_indexes):
        best = max(candidates - selected, key=lambda c: marginal_benefit(c, selected))
        if marginal_benefit(best, selected) > 0:
            selected.add(best)
    ```
    
    ## TECHNIQUES THAT IMPROVE LATENCY
    
    1. **Index join columns** - title.id, name.id joins are critical
    2. **Covering indexes** - avoid random I/O by including filter columns
    3. **Selective columns first** - put high-cardinality columns first in multi-column indexes
    4. **Table prioritization** - title (100%), name (80%), movie_keyword (80%)
    
    ## TECHNIQUES THAT HURT LATENCY (despite improving cost)
    
    1. **Over-indexing large tables** - too many indexes on cast_info (36M rows)
    2. **Redundant indexes** - multiple indexes on same prefix
    3. **Indexes on sequential scan tables** - some tables faster without indexes
    
    ## ⚠️ CRITICAL: SIZE ESTIMATION REQUIREMENT
    
    When calling `cost_evaluation.calculate_cost()`, you MUST use `store_size=True`
    at least once per index to populate `idx.estimated_size`.
    
    ## CONSTRAINTS (PRESERVE EXACTLY)
    
    ```python
    def select_best_indexes(
        workload,
        candidate_indexes: Set[Index],
        cost_evaluation: CostEvaluation,
        max_indexes: int = 15,
        budget_MB: float = 2000.0,
    ) -> Set[Index]:
    ```
    
    **Hard constraints:** Storage <= 2000MB, Count <= 15
    
    Return ONLY the evolved function code.

  num_top_programs: 3
  num_diverse_programs: 2
  use_template_stochasticity: true
  include_artifacts: true
  max_artifact_bytes: 20480

database:
  in_memory: true
  log_prompts: true
  population_size: 500
  archive_size: 100
  num_islands: 3
  migration_interval: 10
  migration_rate: 0.1
  elite_selection_ratio: 0.15
  exploration_ratio: 0.30
  exploitation_ratio: 0.60
  feature_dimensions:
    - "complexity"
    - "diversity"
  feature_bins: 10

evaluator:
  timeout: 2400              # 40 min per eval (extend takes 15-30 min + latency measurement)
  max_retries: 3
  cascade_evaluation: false
  parallel_evaluations: 1    # Sequential to avoid cache interference
  use_llm_feedback: false

# Single workload evaluation with latency fitness
eval_benchmark: "job"

# Environment variables for latency-based fitness
# These are set when running the evolution script
env_vars:
  USE_JOB_LATENCY_FITNESS: "true"
  USE_RELIABILITY_WEIGHTS: "false"   # Not needed when using latency directly
  JOB_SKIP_QUERIES: ""               # Include all 33 queries (fast enough)
  JOB_QUERY_TIMEOUT: "30"            # 30s per query timeout


